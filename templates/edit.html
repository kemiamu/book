{% extends "base.html" %}
<!---->
{% block title %}{{ page_title }} - {{ site_title }}{% endblock title %}
<!---->
{% block head %}
<script>
  function app() {
    return {
      slug: {{ slug | json_encode | safe }},
      title: {{ title | json_encode | safe }},
      body: {{ body | json_encode | safe }},
      error: {{ error | json_encode | safe }},
      loading: false,
      async submit() {
        this.error = "";
        this.loading = true;
        try {
          const res = await fetch("/edit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              slug: this.slug,
              title: this.title,
              body: this.body,
            }),
          });
          if (res.ok) {
            window.location.href = "/view/" + encodeURIComponent(this.slug);
          } else {
            const text = await res.text();
            // Try to extract error message from HTML, fallback to status text
            const match = text.match(/<p class="subtitle">([^<]+)<\/p>/);
            this.error = match ? match[1] : res.statusText;
          }
        } catch (e) {
          this.error = "An error occurred";
        } finally {
          this.loading = false;
        }
      },
    };
  }
</script>
{% endblock head %}
<!---->
{% block body %}
<section class="section">
  <div class="container is-max-desktop">
    <h1 class="title is-3">Edit</h1>

    <form x-data="app()" x-on:submit.prevent="submit">
      <div class="field">
        <label class="label" for="slug">Slug (URL name)</label>
        <div class="control">
          <input class="input" type="text" id="slug" x-model="slug" required />
        </div>
      </div>

      <div class="field">
        <label class="label" for="title">Title</label>
        <div class="control">
          <input
            class="input"
            type="text"
            id="title"
            x-model="title"
            required
          />
        </div>
      </div>

      <div class="field">
        <label class="label" for="body">Body (Markdown)</label>
        <div class="control">
          <textarea
            class="textarea"
            id="body"
            x-model="body"
            rows="20"
          ></textarea>
        </div>
      </div>

      <div class="field">
        <div class="control is-flex is-gap-2">
          <button
            class="button is-primary"
            type="submit"
            x-bind:disabled="loading"
          >
            <span x-text="loading ? 'Saving...' : 'Save'"></span>
          </button>
          <a
            class="button"
            x-bind:href="slug ? '/view/' + encodeURIComponent(slug) : '/'"
            >Cancel</a
          >
        </div>
      </div>

      <p x-show="error" class="has-text-danger" x-text="error"></p>
    </form>
  </div>
</section>
{% endblock body %}
