{% extends "base.html" %}
<!---->
{% block title %}Upload File - {{ site_title }}{% endblock title %}
<!---->
{% block head %}
<script>
  function app() {
    return {
      slug: "",
      title: "",
      file: null,
      error: "",
      loading: false,
      nameFromFile() {
        const el = document.getElementById("file");
        if (el.files.length > 0) {
          const name = el.files[0].name;
          if (!this._slugEdited) {
            this.slug = name;
          }
          if (!this._titleEdited) {
            this.title = name;
          }
        }
      },
      markSlugEdited() {
        this._slugEdited = true;
      },
      markTitleEdited() {
        this._titleEdited = true;
      },
      async submit() {
        this.error = "";
        this.loading = true;
        try {
          const formData = new FormData();
          formData.append("slug", this.slug);
          formData.append("title", this.title);
          if (this.file) {
            formData.append("file", this.file);
          }

          const res = await fetch("/upload", {
            method: "POST",
            body: formData,
          });
          if (res.ok) {
            window.location.href = "/";
          } else {
            const data = await res.json();
            this.error = data.error || res.statusText;
          }
        } catch (e) {
          this.error = "An error occurred";
        } finally {
          this.loading = false;
        }
      },
    };
  }
</script>
{% endblock head %}
<!---->
{% block body %}
<section class="section">
  <div class="container is-max-desktop">
    <h1 class="title is-3">Upload File</h1>

    <form x-data="app()" x-on:submit.prevent="submit">
      <div class="field">
        <label class="label" for="file">File</label>
        <div class="control">
          <input
            class="input"
            type="file"
            id="file"
            x-on:change="file = $event.target.files[0]; nameFromFile()"
            required
          />
        </div>
      </div>

      <div class="field">
        <label class="label" for="title">Title</label>
        <div class="control">
          <input
            class="input"
            type="text"
            id="title"
            x-model="title"
            x-on:input="markTitleEdited"
            required
          />
        </div>
      </div>

      <div class="field">
        <label class="label" for="slug">Slug (URL name for download)</label>
        <div class="control">
          <input
            class="input"
            type="text"
            id="slug"
            x-model="slug"
            x-on:input="markSlugEdited"
            required
          />
        </div>
      </div>

      <div class="field">
        <div class="control is-flex is-gap-2">
          <button
            class="button is-primary"
            type="submit"
            x-bind:disabled="loading"
          >
            <span x-text="loading ? 'Uploading...' : 'Upload'"></span>
          </button>
          <a class="button" href="/">Cancel</a>
        </div>
      </div>

      <p x-show="error" class="has-text-danger" x-text="error"></p>
    </form>
  </div>
</section>
{% endblock body %}
