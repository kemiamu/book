{% extends "base.html" %} {% import "macros.html" as ui %} {% block title %}Sign
In - {{ site_title }}{% endblock title %} {% block body %}
<section class="section">
  <div class="container">
    <div class="columns is-centered">
      <div class="column is-half">
        <div class="has-text-centered">
          <h1 class="title is-4">Welcome back</h1>
          <p class="has-text-grey">Sign in to your account</p>
        </div>
        <div class="card">
          <div class="card-content">
            <form x-data="signInApp()" x-on:submit.prevent="submit">
              <div class="field">
                <label class="label" for="username">Username</label>
                <div class="control">
                  <input
                    class="input"
                    type="text"
                    id="username"
                    x-model="username"
                    required
                    placeholder="Your username"
                    autocomplete="username"
                  />
                </div>
              </div>
              <div class="field">
                <label class="label" for="password">Password</label>
                <div class="control">
                  <input
                    class="input"
                    type="password"
                    id="password"
                    x-model="password"
                    required
                    placeholder="Your password"
                    autocomplete="current-password"
                  />
                </div>
              </div>
              {{ ui::error_notification() }}
              <div class="field">
                <div class="control">
                  <button
                    class="button is-primary is-fullwidth is-rounded"
                    type="submit"
                    :class="{'is-loading':loading}"
                    :disabled="loading"
                  >
                    Sign In
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
        <p class="has-text-centered has-text-grey">
          Don't have an account?
          <a href="/sign-up" class="has-text-primary"
            ><strong>Sign up</strong></a
          >
        </p>
      </div>
    </div>
  </div>
</section>
<script>
  function signInApp() {
    return {
      username: "",
      password: "",
      error: "",
      loading: false,
      async submit() {
        this.error = "";
        this.loading = true;
        try {
          const r = await fetch("/sign-in", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: this.username,
              password: this.password,
            }),
          });
          if (r.ok) {
            window.location.href = "/";
          } else {
            const d = await r.json();
            this.error = d.error;
          }
        } catch (e) {
          this.error = "Network error";
        } finally {
          this.loading = false;
        }
      },
    };
  }
</script>
{% endblock body %}
