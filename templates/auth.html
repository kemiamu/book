{% import "macros/_form.html" as form %}
{% import "macros/_notification.html" as notify %}
{% extends "_base.html" %}
{% block title %}Authorization - {{ site_title }}{% endblock title %}
{% block head %}
<script defer>
function authApp() {
  return {
    page: "landing",
    passkey: "{{ passkey | safe }}",
    username: "",
    password: "",
    confirm: "",
    error: "",
    loading: false,
    get btnText() {
      return this.page === "sign-in" ? "Sign In" : "Create Account";
    },
    goSignIn() {
      this.page = "sign-in";
      this.error = "";
    },
    goSignUp() {
      this.page = "sign-up";
      this.error = "";
    },
    goBack() {
      this.page = "landing";
      this.error = "";
    },
    async submit() {
      this.error = "";
      if (this.page === "sign-up" && this.password !== this.confirm) {
        this.error = "Passwords do not match";
        return;
      }
      this.loading = true;
      try {
        const endpoint = this.page === "sign-in" ? "/auth/sign-in" : "/auth/sign-up";
        const body = {
          passkey: this.passkey,
          username: this.username,
          password: this.password,
        };
        const r = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        if (r.ok) window.location.href = "/";
        else {
          const d = await r.json();
          this.error = d.error || "Request failed";
        }
      } catch (e) {
        this.error = "Network error";
      } finally {
        this.loading = false;
      }
    },
  };
}
</script>
{% endblock head %}
{% block body %}
<section class="section is-medium">
  <div class="container">
    <div class="columns is-centered">
      <div class="column is-half" x-data="authApp()">
        <template x-if="page === 'landing'">
          <div>
            <div class="block has-text-centered">
              <h1 class="title is-3">Authorization</h1>
            </div>
            <div class="notification is-info">
              <p class="has-text-weight-bold">&#10003; Valid Passkey provided</p>
              <p class="mt-2">This is an important credential. Keep it secure and do not share it with untrusted parties.</p>
            </div>
            <div class="block mt-5">
              <p class="has-text-centered has-text-grey mb-4">Select an action below to proceed:</p>
              <div class="buttons is-centered">
                <a class="button" x-on:click="goSignIn">Sign In</a>
                <a class="button" x-on:click="goSignUp">Create Account</a>
              </div>
            </div>
          </div>
        </template>

        <template x-if="page !== 'landing'">
          <div>
            <div class="block has-text-centered">
              <h1 class="title is-4" x-text="btnText"></h1>
            </div>
            <div class="card">
              <div class="card-content">
                <form x-on:submit.prevent="submit">
                  <input type="hidden" name="passkey" :value="passkey" />

                  {{ form::input(label="Username", id="username", model="username", required=true, placeholder="Your username", autocomplete="username") }}
                  {{ form::input(label="Password", id="password", model="password", required=true, placeholder="Your password", type="password", autocomplete="current-password") }}
                  <template x-if="page === 'sign-up'">
                    {{ form::input(label="Confirm Password", id="confirm", model="confirm", required=true, placeholder="Repeat password", type="password", autocomplete="new-password") }}
                  </template>
                  {{ notify::error_notification() }}
                  <div class="field">
                    <div class="control">
                      <button
                        class="button is-primary is-fullwidth"
                        type="submit"
                        :class="{'is-loading':loading}"
                        :disabled="loading"
                        x-text="btnText"
                      ></button>
                    </div>
                  </div>

                  <div class="has-text-centered mt-2">
                    <a x-on:click.prevent="goBack" class="has-text-grey-light">&larr; Back</a>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>
</section>
{% endblock body %}
