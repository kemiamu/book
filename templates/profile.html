{% extends "_base.html" %}
{% block title %}Profile - {{ site_title }}{% endblock title %}
{% block body %}
<section class="section is-medium">
  <div class="container is-max-desktop">
    <h1 class="title is-4">Profile</h1>
    <div class="block" x-data="{
      show: false,
      passkeyUrl: '{{ passkey_url }}',
      copied: false,
      copy() {
        navigator.clipboard.writeText(this.passkeyUrl).then(() => {
          this.copied = true;
          setTimeout(() => this.copied = false, 2000);
        });
      }
    }">
      <h2 class="title is-5">Passkey Link</h2>
      <div class="block">
        <p class="has-text-grey">
          A passkey is generated each time you visit this page. It expires in 7 days and cannot be revoked or restricted during its validity.
        </p>
      </div>
      <div class="block">
        <div class="buttons">
        <button
          class="button"
          :class="show ? 'is-primary' : 'is-warning'"
          x-on:click="show = !show"
        >
          <span x-text="show ? 'Hide' : 'Show passkey link'"></span>
        </button>
        <template x-if="show">
          <button class="button" x-on:click="copy">
            Copy
          </button>
        </template>
        </div>
      </div>
      <template x-if="show">
        <div class="block">
          <div class="notification is-warning is-block">
            <p>
              This link is valid until {{ passkey_code_expiry }}. It cannot be revoked, and anyone with it can access this site.
            </p>
            <p class="block"><a class="has-text-weight-bold" style="word-break: break-all" :href="passkeyUrl" x-text="passkeyUrl"></a></p>
          </div>
          <template x-if="copied">
            <p class="has-text-success">
              Copied to clipboard!
            </p>
          </template>
        </div>
      </template>
    </div>
    <a href="/" class="has-text-grey">&larr; Back to Home</a>
  </div>
</section>
{% endblock body %}
